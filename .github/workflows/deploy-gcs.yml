name: Deploy to Google Cloud Storage

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 1 * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch budget data from obudget.org API
        run: |
          bash fetch-budget.sh
          echo "--- Files created ---"
          ls -la budget-data-*.json 2>/dev/null || echo "No budget files created"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload HTML to Cloud Storage
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .
          destination: ${{ secrets.GCS_BUCKET_NAME }}
          glob: '**/*.html'
          process_gcloudignore: false
          headers: |-
            content-type: text/html; charset=utf-8
            cache-control: public, max-age=300

      - name: Upload budget data JSON files
        if: ${{ success() }}
        run: |
          for f in budget-data-*.json; do
            [ -f "$f" ] || continue
            echo "Uploading $f..."
            gcloud storage cp "$f" gs://${{ secrets.GCS_BUCKET_NAME }}/"$f" \
              --content-type="application/json; charset=utf-8" \
              --cache-control="public, max-age=86400"
          done
          echo "Done!"
