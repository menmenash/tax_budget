name: Deploy to Google Cloud Storage

on:
  push:
    branches: [main]
  schedule:
    # Re-fetch budget data monthly (in case budget is updated)
    - cron: '0 6 1 * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch budget data from obudget.org API
        run: bash fetch-budget.sh

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload HTML to Cloud Storage
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .
          destination: ${{ secrets.GCS_BUCKET_NAME }}
          glob: '**/*.html'
          process_gcloudignore: false
          headers: |-
            content-type: text/html; charset=utf-8
            cache-control: public, max-age=300

      - name: Upload budget data JSON
        uses: google-github-actions/upload-cloud-storage@v2
        if: hashFiles('budget-data.json') != ''
        with:
          path: budget-data.json
          destination: ${{ secrets.GCS_BUCKET_NAME }}
          process_gcloudignore: false
          headers: |-
            content-type: application/json; charset=utf-8
            cache-control: public, max-age=86400
