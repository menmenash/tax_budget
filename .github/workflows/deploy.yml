name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Re-fetch budget data monthly (in case budget is updated)
    - cron: '0 6 1 * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch budget data from obudget.org API
        run: |
          bash fetch-budget.sh
          echo "--- Files created ---"
          ls -la budget-data-*.json 2>/dev/null || echo "No budget files created"

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp en.html _site/
          cp CNAME _site/
          cp tests.html _site/ 2>/dev/null || true
          cp budget-data-*.json _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
