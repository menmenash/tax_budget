name: Deploy to Google Cloud Storage

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Option A: Workload Identity Federation (recommended, no key file)
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Option B: Service Account Key (uncomment below, comment out above)
          # credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload to Cloud Storage
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .
          destination: ${{ secrets.GCS_BUCKET_NAME }}
          glob: '**/*.html'
          process_gcloudignore: false
          headers: |-
            content-type: text/html; charset=utf-8
            cache-control: public, max-age=300

      - name: Set bucket website configuration
        run: |
          gcloud storage buckets update gs://${{ secrets.GCS_BUCKET_NAME }} \
            --web-main-page-suffix=index.html \
            --web-not-found-page=index.html
